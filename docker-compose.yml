services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: barbershop-platform-api
    environment:
      APP_NAME: ${APP_NAME:-barbershop-platform}
      APP_ENV: ${APP_ENV:-local}
      DEBUG: ${DEBUG:-true}
      SECRET_KEY: ${SECRET_KEY:-change-me-to-a-long-random-string}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-barbershop_platform}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DATABASE_URL: ${DATABASE_URL:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:8000}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    command: sh /app/scripts/start.sh
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/public/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10

  db:
    image: postgres:16-alpine
    container_name: barbershop-platform-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-barbershop_platform}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-barbershop_platform}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
